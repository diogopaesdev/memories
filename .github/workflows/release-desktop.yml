name: Release Desktop App

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build shared package
        run: npx tsc --project packages/shared/tsconfig.json --noEmit || true

      - name: Build and publish desktop app
        working-directory: apps/desktop
        run: npx vite build && npx electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_WEB_APP_URL: ${{ vars.WEB_APP_URL || 'https://projectsreport.vercel.app' }}
